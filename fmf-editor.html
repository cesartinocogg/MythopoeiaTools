<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map for Mythopoeia</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
        }
        :root {
            --void: #08080d;
            --void-2: #0d1220;
            --panel: #111a2e;
            --panel-2: #16213b;
            --panel-3: #1c2a47;
            --line: #223354;
            --line-soft: #1a2740;
            --gold: #e2b96f;
            --gold-dim: #a9884f;
            --ink: #cdd3dd;
            --ink-hi: #f2efe7;
            --ink-dim: #8790a1;
            --ink-faint: #566179;
            --f-display: 'Cinzel', serif;
            --f-body: system-ui, -apple-system, sans-serif;
            --f-mono: monospace;
            --radius: 8px;
        }
        body {
            background: var(--void);
            color: var(--ink);
            font-family: var(--f-body);
            font-size: 14px;
            overflow: hidden;
            height: 100vh;
            margin: 0;
            user-select: none;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--void-2);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--panel-3);
            border-radius: 4px;
        }
        .app {
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        .sidebar {
            width: 320px;
            background: rgba(13, 18, 32, 0.96);
            backdrop-filter: blur(8px);
            border-right: 1px solid var(--line);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 10;
            overflow: hidden;
            transition: transform 0.25s ease;
        }
        .sidebar.collapsed {
            transform: translateX(-100%);
            position: absolute;
            height: 100%;
        }
        .sidebar-header {
            padding: 14px 18px 10px;
            border-bottom: 1px solid var(--line-soft);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .sidebar-header h1 {
            font-family: var(--f-display);
            font-size: 18px;
            color: var(--ink-hi);
        }
        .sidebar-header .badge {
            font-size: 11px;
            background: var(--panel-3);
            padding: 2px 10px;
            border-radius: 20px;
            color: var(--gold-dim);
            font-weight: bold;
        }
        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 14px 18px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .sidebar-footer {
            padding: 10px 18px;
            border-top: 1px solid var(--line-soft);
            background: var(--panel);
            flex-shrink: 0;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .section-title {
            font-family: var(--f-mono);
            font-size: 10px;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--ink-faint);
            margin-bottom: 6px;
        }
        .btn-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .btn {
            background: transparent;
            border: 1px solid var(--line);
            color: var(--ink-dim);
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 12px;
            transition: all .15s;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-family: inherit;
            white-space: nowrap;
        }
        .btn:hover {
            border-color: var(--gold-dim);
            color: var(--ink-hi);
        }
        .btn.active {
            background: var(--gold);
            border-color: var(--gold);
            color: #1a1305;
            font-weight: bold;
        }
        .btn.primary {
            background: var(--gold);
            border-color: var(--gold);
            color: #1a1305;
            font-weight: bold;
        }
        .btn.primary:hover {
            background: #eec988;
        }
        .btn.small {
            padding: 3px 10px;
            font-size: 11px;
        }
        .btn.danger {
            color: #e74c3c;
            border-color: #e74c3c;
        }
        .btn.danger:hover {
            background: #e74c3c;
            color: #fff;
        }
        .tool-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
        }
        .tool-grid .btn {
            justify-content: center;
            padding: 8px 4px;
            font-size: 12px;
            border-radius: var(--radius);
            border: 1px solid var(--line);
            background: var(--panel-2);
            color: var(--ink-hi);
            width: 100%;
        }
        .tool-grid .btn.active {
            background: var(--gold);
            border-color: var(--gold);
            color: #1a1305;
        }
        .brush-options {
            background: var(--panel-2);
            padding: 10px;
            border-radius: var(--radius);
            border: 1px solid var(--line);
            margin-top: 4px;
        }
        .brush-options .row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .brush-options .row label {
            font-size: 12px;
            color: var(--ink-dim);
            min-width: 40px;
        }
        .brush-options input[type="range"] {
            flex: 1;
            accent-color: var(--gold);
            background: transparent;
        }
        .brush-options input[type="color"] {
            width: 32px;
            height: 32px;
            border: none;
            padding: 0;
            background: transparent;
            cursor: pointer;
        }
        .brush-options .val {
            font-size: 12px;
            color: var(--ink-hi);
            min-width: 28px;
            text-align: center;
        }
        .layer-list {
            max-height: 150px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .layer-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--panel-2);
            padding: 4px 8px;
            border-radius: var(--radius);
            border: 1px solid var(--line-soft);
            margin-bottom: 4px;
            font-size: 13px;
        }
        .layer-item label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            color: var(--ink-hi);
            flex: 1;
        }
        .layer-item input[type="checkbox"] {
            appearance: none;
            width: 14px;
            height: 14px;
            border: 1px solid var(--line);
            border-radius: 3px;
            background: var(--panel);
            cursor: pointer;
            flex-shrink: 0;
        }
        .layer-item input[type="checkbox"]:checked {
            background: var(--gold);
            border-color: var(--gold);
        }
        .layer-item input[type="checkbox"]:checked::after {
            content: '✓';
            display: block;
            text-align: center;
            font-size: 10px;
            color: #1a1305;
            font-weight: 900;
        }
        .layer-item .del {
            background: transparent;
            border: none;
            color: var(--ink-faint);
            cursor: pointer;
            font-size: 12px;
            padding: 0 4px;
        }
        .layer-item .del:hover {
            color: #e74c3c;
        }
        .layer-item.active-layer span {
            color: var(--gold);
            font-weight: 700;
        }
        .add-layer-row {
            display: flex;
            gap: 6px;
            margin-top: 4px;
        }
        .add-layer-row input {
            flex: 1;
            padding: 4px 8px;
            border-radius: var(--radius);
            border: 1px solid var(--line);
            background: var(--void-2);
            color: var(--ink-hi);
            font-size: 13px;
        }
        .image-gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 4px 0;
            max-height: 140px;
            overflow-y: auto;
        }
        .image-gallery .thumb-wrap {
            position: relative;
            display: inline-block;
            cursor: grab;
            user-select: none;
            border: 2px solid transparent;
            border-radius: var(--radius);
            transition: border-color .2s;
        }
        .image-gallery .thumb-wrap:hover {
            border-color: var(--gold);
        }
        .image-gallery .thumb-wrap img {
            width: 56px;
            height: 56px;
            object-fit: cover;
            border-radius: var(--radius);
            display: block;
        }
        .image-gallery .thumb-wrap .del {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #e74c3c;
            border: none;
            color: #fff;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            font-size: 10px;
            cursor: pointer;
            line-height: 1;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .prop-panel {
            background: var(--panel-2);
            border: 1px solid var(--gold-dim);
            border-radius: var(--radius);
            padding: 12px;
            display: none;
        }
        .prop-panel.visible {
            display: block;
        }
        .prop-panel .prop-row {
            margin-bottom: 8px;
        }
        .prop-panel .prop-row label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--ink-hi);
            margin-bottom: 2px;
        }
        .prop-panel .prop-row input,
        .prop-panel .prop-row select {
            width: 100%;
            padding: 4px 8px;
            border-radius: var(--radius);
            border: 1px solid var(--line);
            background: var(--void-2);
            color: var(--ink-hi);
            font-size: 13px;
        }
        .prop-panel .prop-row input[type="color"] {
            height: 32px;
            padding: 2px;
        }
        .flex {
            display: flex;
        }
        .items-center {
            align-items: center;
        }
        .justify-between {
            justify-content: space-between;
        }
        .gap-2 {
            gap: 8px;
        }
        .gap-1 {
            gap: 4px;
        }
        .mb-2 {
            margin-bottom: 8px;
        }
        .mt-2 {
            margin-top: 8px;
        }
        .hidden {
            display: none !important;
        }
        .w-full {
            width: 100%;
        }
        .text-sm {
            font-size: 13px;
        }
        .text-xs {
            font-size: 11px;
        }
        .text-gold {
            color: var(--gold);
        }
        .main-view {
            flex: 1;
            position: relative;
            background: #0a1628;
            overflow: hidden;
            transition: box-shadow 0.2s ease;
        }
        .main-view.drag-over {
            box-shadow: inset 0 0 0 4px var(--gold);
        }
        #mapCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        #brushPreview {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            border: 2px solid rgba(226, 185, 111, 0.6);
            background: rgba(226, 185, 111, 0.15);
            transform: translate(-50%, -50%);
            display: none;
            z-index: 5;
        }
        .zoom-controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 4px;
            background: rgba(13, 18, 32, 0.8);
            padding: 6px 8px;
            border-radius: var(--radius);
            border: 1px solid var(--line);
            backdrop-filter: blur(4px);
            z-index: 20;
        }
        .zoom-controls .btn {
            padding: 4px 8px;
            font-size: 14px;
            min-width: 32px;
            justify-content: center;
            background: var(--panel-2);
            border: 1px solid var(--line);
            color: var(--ink-hi);
            border-radius: var(--radius);
        }
        .zoom-controls .btn:hover {
            border-color: var(--gold);
        }
        .zoom-controls .zoom-level {
            padding: 0 8px;
            font-size: 12px;
            color: var(--ink-dim);
            display: flex;
            align-items: center;
            min-width: 50px;
            justify-content: center;
        }
        .menu-toggle {
            position: fixed;
            top: 14px;
            left: 270px;
            width: 38px;
            height: 38px;
            border-radius: var(--radius);
            background: rgba(28, 42, 71, 0.9);
            backdrop-filter: blur(4px);
            border: 1px solid var(--line);
            color: var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            cursor: pointer;
            transition: left 0.25s ease, background 0.2s;
            font-size: 20px;
        }
        .menu-toggle:hover {
            background: var(--panel-2);
            border-color: var(--gold);
        }
        .sidebar.collapsed~.menu-toggle {
            left: 16px;
        }
        .log-container {
            background: var(--panel-2);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 6px 10px;
            max-height: 80px;
            overflow-y: auto;
            font-size: 11px;
            font-family: var(--f-mono);
            color: var(--ink-dim);
            margin-top: 4px;
        }
        .log-container .log-entry {
            padding: 2px 0;
            border-bottom: 1px solid var(--line-soft);
        }
        .log-container .log-entry:last-child {
            border-bottom: none;
        }
        @media (max-width: 760px) {
            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                bottom: 0;
                transform: translateX(-100%);
                width: 280px;
            }
            .sidebar:not(.collapsed) {
                transform: translateX(0);
            }
            .menu-toggle {
                left: 16px;
            }
            .sidebar:not(.collapsed)~.menu-toggle {
                left: 244px;
            }
            .tool-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1>🗺️ Map for Mythopoeia</h1>
                <span class="badge" id="mapSizeBadge">2K</span>
            </div>
            <div class="sidebar-content">
                <div>
                    <div class="section-title">Map Size</div>
                    <div class="btn-group">
                        <button onclick="setMapSize(1024)" class="btn" id="size1k">1K</button>
                        <button onclick="setMapSize(2048)" class="btn active" id="size2k">2K</button>
                        <button onclick="setMapSize(4096)" class="btn" id="size4k">4K</button>
                    </div>
                </div>

                <div>
                    <div class="section-title">Tools</div>
                    <div class="tool-grid">
                        <button id="toolSelect" onclick="setTool('select')" class="btn active">↖️ Select</button>
                        <button id="toolBrush" onclick="setTool('brush')" class="btn">🖌️ Brush</button>
                        <button id="toolEraser" onclick="setTool('eraser')" class="btn">🧹 Eraser</button>
                        <button id="toolImage" onclick="setTool('image')" class="btn">🖼️ Image</button>
                        <button id="toolText" onclick="setTool('text')" class="btn">📝 Text</button>
                        <button id="toolPicker" onclick="setTool('picker')" class="btn">🧪 Dripper</button>
                    </div>

                    <div id="brushOptions" class="brush-options hidden">
                        <div class="row">
                            <label>Size</label>
                            <input id="brushSize" type="range" min="4" max="120" value="28" step="1">
                            <span class="val" id="brushSizeVal">28</span>
                        </div>
                        <div class="row" id="brushColorRow">
                            <label>Color</label>
                            <input id="brushColor" type="color" value="#6b8f5e">
                        </div>
                    </div>

                    <div id="imageGalleryContainer" class="hidden mt-2">
                        <div class="section-title">Image Gallery <span class="text-xs" style="color:var(--ink-dim);">(drag or double‑click)</span></div>
                        <div class="flex gap-1">
                            <button onclick="loadImage()" class="btn primary small">+ Add Image</button>
                            <button onclick="clearGallery()" class="btn small danger">Clear All</button>
                        </div>
                        <div id="imageGallery" class="image-gallery"></div>
                    </div>

                    <div id="textToolContainer" class="hidden mt-2">
                        <div class="section-title">Add Text</div>
                        <div class="flex gap-1">
                            <input id="textInput" type="text" placeholder="Your label..." style="flex:1; padding:4px 8px; border-radius:var(--radius); border:1px solid var(--line); background:var(--void-2); color:var(--ink-hi); font-size:13px;">
                            <button onclick="addText()" class="btn primary small">Add</button>
                        </div>
                    </div>
                </div>

                <div>
                    <div class="flex items-center justify-between">
                        <div class="section-title" style="margin:0;">Layers</div>
                        <button onclick="toggleAddLayer()" class="btn small">+ New</button>
                    </div>
                    <div id="addLayerRow" class="add-layer-row hidden mt-2">
                        <input id="newLayerName" type="text" placeholder="Layer name" value="New Layer">
                        <button onclick="createNewLayer()" class="btn primary small">Create</button>
                        <button onclick="toggleAddLayer()" class="btn small">Cancel</button>
                    </div>
                    <div class="mt-2">
                        <label class="text-xs" style="color:var(--ink-dim);">Active Layer:</label>
                        <select id="selectCapaActiva" onchange="selectActiveLayer(this.value)" style="width:100%; padding:3px 6px; background:var(--void-2); color:var(--ink-hi); border:1px solid var(--line); border-radius:var(--radius); font-size:13px; margin-top:2px;"></select>
                    </div>
                    <div id="listaCapas" class="layer-list mt-2"></div>
                </div>

                <div id="propPanel" class="prop-panel">
                    <div class="flex items-center justify-between" style="border-bottom:1px solid var(--line-soft); padding-bottom:6px; margin-bottom:8px;">
                        <span id="propIcon">⚙️</span>
                        <button onclick="deleteSelected()" class="btn small danger">🗑️ Remove</button>
                    </div>
                    <div id="propContent"></div>
                </div>

                <div>
                    <div class="section-title">Export</div>
                    <div class="btn-group">
                        <button onclick="exportMap('png')" class="btn">PNG</button>
                        <button onclick="exportMap('jpg')" class="btn">JPG</button>
                        <button onclick="exportMap('svg')" class="btn">SVG</button>
                    </div>
                </div>
                <div>
                    <div class="section-title">Project</div>
                    <div class="btn-group">
                        <button onclick="saveProject()" class="btn primary" style="flex:1;">💾 Save .fmf</button>
                        <button onclick="loadProject()" class="btn" style="flex:1; border-color:var(--gold); color:var(--gold);">📂 Load</button>
                    </div>
                </div>

                <div>
                    <div class="section-title">Activity Log</div>
                    <div id="logContainer" class="log-container"></div>
                </div>
            </div>
            <div class="sidebar-footer" style="flex-direction: column; gap: 6px;">
                <span class="text-xs" style="color:var(--ink-faint);">🖱️ Wheel: Zoom • Alt+Drag: Pan</span>
                <span class="text-xs" style="color:var(--ink-dim); line-height: 1.3;">
                    Created by <strong>Cesar Tinoco</strong>, support him on 
                    <a href="https://patreon.com/c/CesarTinocoGG" target="_blank" style="color:var(--gold); text-decoration:none; font-weight:bold;">Patreon</a>
                    <a href="https://cesartinocogg.github.io/MythopoeiaTools/fmf-manual.html" target="_blank" style="color:var(--gold); text-decoration:none; font-weight:bold;">MANUAL</a>
                </span>
            </div>
        </aside>

        <button class="menu-toggle" onclick="toggleSidebar()" title="Toggle menu">☰</button>

        <div class="main-view" id="mainView">
            <canvas id="mapCanvas"></canvas>
            <div id="brushPreview"></div>
            <div class="zoom-controls">
                <button onclick="zoomIn()" class="btn">＋</button>
                <span class="zoom-level" id="zoomLevel">100%</span>
                <button onclick="zoomOut()" class="btn">－</button>
                <button onclick="zoomFit()" class="btn">⊡</button>
            </div>
        </div>
    </div>

    <script>
        // SECTION: STATE & CONFIGURATION
        let mapWidth = 2048;
        let mapHeight = 2048;
        const DEFAULT_BG = '#1a3a5a';

        let currentTool = 'select';

        let layers = [{ id: 'layer_base', name: 'Base', visible: true }];
        let activeLayerId = 'layer_base';
        let loadedImages = [];
        let logEntries = [];
        let mapBackgroundObj = null;

        // SECTION: CANVAS INITIALIZATION
        const containerElement = document.getElementById('mainView');
        const canvas = new fabric.Canvas('mapCanvas', {
            width: containerElement.clientWidth,
            height: containerElement.clientHeight,
            backgroundColor: '#0a1628',
            preserveObjectStacking: true,
            selection: true
        });

        function createMapBackground() {
            if (mapBackgroundObj) canvas.remove(mapBackgroundObj);
            mapBackgroundObj = new fabric.Rect({
                left: 0,
                top: 0,
                width: mapWidth,
                height: mapHeight,
                fill: DEFAULT_BG,
                stroke: '#e2b96f',
                strokeWidth: 4,
                selectable: false,
                evented: false,
                excludeFromExport: false,
                idLayer: 'immutable_background',
                elementName: 'Map Border',
                erasable: false
            });
            canvas.add(mapBackgroundObj);
            mapBackgroundObj.sendToBack();

            canvas.clipPath = new fabric.Rect({
                left: 0,
                top: 0,
                width: mapWidth,
                height: mapHeight,
                absolutePositioned: true
            });
        }

        function constrainToCanvas(obj) {
            if (!obj || obj.idLayer === 'immutable_background' || obj.elementType === 'brush') return;
            obj.setCoords();
            const br = obj.getBoundingRect();
            let dx = 0, dy = 0;
            if (br.left < 0) dx = -br.left;
            else if (br.left + br.width > mapWidth) {
                dx = mapWidth - (br.left + br.width);
                if (br.width > mapWidth) dx = -br.left;
            }
            if (br.top < 0) dy = -br.top;
            else if (br.top + br.height > mapHeight) {
                dy = mapHeight - (br.top + br.height);
                if (br.height > mapHeight) dy = -br.top;
            }
            if (dx !== 0 || dy !== 0) {
                obj.set({ left: obj.left + dx, top: obj.top + dy });
                obj.setCoords();
            }
        }

        canvas.on('moving', (e) => constrainToCanvas(e.target));
        canvas.on('object:modified', (e) => constrainToCanvas(e.target));

        function fitCanvas() {
            const cw = containerElement.clientWidth;
            const ch = containerElement.clientHeight;
            canvas.setWidth(cw);
            canvas.setHeight(ch);
            const padding = 60;
            const scaleX = (cw - padding * 2) / mapWidth;
            const scaleY = (ch - padding * 2) / mapHeight;
            const zoom = Math.min(scaleX, scaleY, 1.0);
            const offsetX = (cw - mapWidth * zoom) / 2;
            const offsetY = (ch - mapHeight * zoom) / 2;
            canvas.setZoom(zoom);
            canvas.setViewportTransform([zoom, 0, 0, zoom, offsetX, offsetY]);
            canvas.calcOffset();
            canvas.renderAll();
            updateZoomDisplay();
        }

        window.addEventListener('resize', fitCanvas);

        // SECTION: LOGGING
        function addLog(message) {
            logEntries.push(message);
            const container = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = '• ' + message;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
            if (logEntries.length > 100) {
                logEntries.shift();
                container.removeChild(container.firstChild);
            }
        }

        // SECTION: MAP SIZE
        function setMapSize(size) {
            if (size === mapWidth) return;
            const userObjs = canvas.getObjects().filter(o => o.idLayer && o.idLayer !== 'immutable_background');
            if (userObjs.length > 0) {
                if (!confirm('Changing map size will clear all drawing objects. Continue?')) return;
            }
            mapWidth = size;
            mapHeight = size;
            canvas.clear();
            canvas.backgroundColor = '#0a1628';
            createMapBackground();
            document.getElementById('mapSizeBadge').textContent = (size / 1024) + 'K';
            document.querySelectorAll('.btn-group .btn').forEach(b => b.classList.remove('active'));
            if (size === 1024) document.querySelector('#size1k')?.classList.add('active');
            else if (size === 2048) document.querySelector('#size2k')?.classList.add('active');
            else if (size === 4096) document.querySelector('#size4k')?.classList.add('active');
            layers = [{ id: 'layer_base', name: 'Base', visible: true }];
            activeLayerId = 'layer_base';
            loadedImages = [];
            updateGallery();
            updateLayersUI();
            hideProperties();
            if (currentTool !== 'select') setTool('select');
            fitCanvas();
            addLog('Map size changed to ' + size + 'x' + size);
        }

        // SECTION: TOOLS & ERASABLE CONFIG
        function updateErasableObjects() {
            canvas.getObjects().forEach(o => {
                if (o.elementType === 'brush' && o.idLayer === activeLayerId) {
                    o.erasable = true;
                } else {
                    o.erasable = false;
                }
            });
        }

        function setTool(tool) {
            if (currentTool === 'brush' || currentTool === 'eraser') {
                canvas.isDrawingMode = false;
                document.getElementById('brushOptions').classList.add('hidden');
                document.getElementById('brushPreview').style.display = 'none';
            }
            if (currentTool === 'image') document.getElementById('imageGalleryContainer').classList.add('hidden');
            if (currentTool === 'text') document.getElementById('textToolContainer').classList.add('hidden');

            document.querySelectorAll('.tool-grid .btn').forEach(b => b.classList.remove('active'));
            currentTool = tool;

            if (tool === 'select') {
                document.getElementById('toolSelect').classList.add('active');
                canvas.selection = true;
                canvas.defaultCursor = 'default';
                canvas.getObjects().forEach(o => {
                    if (o.idLayer && o.idLayer !== 'immutable_background' && o.elementType !== 'brush') {
                        o.selectable = true;
                        o.evented = true;
                    }
                });
            } else if (tool === 'brush') {
                document.getElementById('toolBrush').classList.add('active');
                document.getElementById('brushOptions').classList.remove('hidden');
                document.getElementById('brushColorRow').style.display = 'flex';
                document.getElementById('brushPreview').style.display = 'block';
                canvas.selection = false;
                canvas.discardActiveObject();
                canvas.getObjects().forEach(o => { o.selectable = false; });
                canvas.isDrawingMode = true;
                canvas.freeDrawingBrush = new fabric.PencilBrush(canvas);
                canvas.freeDrawingBrush.decimate = 2;
                updateBrushPreview();
            } else if (tool === 'eraser') {
                document.getElementById('toolEraser').classList.add('active');
                document.getElementById('brushOptions').classList.remove('hidden');
                document.getElementById('brushColorRow').style.display = 'none';
                document.getElementById('brushPreview').style.display = 'block';
                canvas.selection = false;
                canvas.discardActiveObject();
                canvas.getObjects().forEach(o => { o.selectable = false; });
                
                canvas.isDrawingMode = true;
                canvas.freeDrawingBrush = new fabric.PencilBrush(canvas);
                updateBrushPreview();
                addLog('Eraser activated');
            } else if (tool === 'image') {
                document.getElementById('toolImage').classList.add('active');
                document.getElementById('imageGalleryContainer').classList.remove('hidden');
                updateGallery();
            } else if (tool === 'text') {
                document.getElementById('toolText').classList.add('active');
                document.getElementById('textToolContainer').classList.remove('hidden');
            } else if (tool === 'picker') {
                document.getElementById('toolPicker').classList.add('active');
                canvas.selection = false;
                canvas.discardActiveObject();
                canvas.getObjects().forEach(o => { o.selectable = false; });
                canvas.defaultCursor = 'crosshair';
                addLog('Gotero activado');
            }
            hideProperties();
            canvas.renderAll();
        }

        // SECTION: BRUSH & ERASER PREVIEW
        function updateBrushPreview() {
            const size = parseInt(document.getElementById('brushSize').value) || 28;
            const color = currentTool === 'eraser' ? DEFAULT_BG : (document.getElementById('brushColor').value || '#6b8f5e');
            const preview = document.getElementById('brushPreview');
            preview.style.width = size + 'px';
            preview.style.height = size + 'px';
            preview.style.borderColor = currentTool === 'eraser' ? '#e74c3c' : color;
            preview.style.background = currentTool === 'eraser' ? 'rgba(231, 76, 60, 0.2)' : color + '33';
            if (canvas.isDrawingMode && canvas.freeDrawingBrush) {
                canvas.freeDrawingBrush.width = size;
                canvas.freeDrawingBrush.color = color;
            }
        }

        document.getElementById('brushSize').addEventListener('input', function() {
            document.getElementById('brushSizeVal').textContent = this.value;
            updateBrushPreview();
        });
        document.getElementById('brushColor').addEventListener('input', updateBrushPreview);

        canvas.on('path:created', function(opt) {
            if (currentTool !== 'brush' && currentTool !== 'eraser') return;
            const path = opt.path;
            path.set({
                idLayer: activeLayerId,
                elementType: 'brush',
                elementName: currentTool === 'eraser' ? 'Eraser Stroke' : 'Brush Stroke',
                selectable: false,
                evented: false,
                hasControls: false,
                hasBorders: false,
                erasable: true
            });
            addLog(currentTool === 'eraser' ? 'Eraser stroke created' : 'Brush stroke created');
        });

        canvas.on('mouse:move', function(opt) {
            if (currentTool === 'brush' || currentTool === 'eraser') {
                const rect = containerElement.getBoundingClientRect();
                const px = opt.e.clientX - rect.left;
                const py = opt.e.clientY - rect.top;
                const preview = document.getElementById('brushPreview');
                preview.style.display = 'block';
                preview.style.left = px + 'px';
                preview.style.top = py + 'px';
                if (currentTool === 'eraser') {
                    preview.style.borderColor = '#e74c3c';
                    preview.style.background = 'rgba(231, 76, 60, 0.2)';
                } else {
                    updateBrushPreview();
                }
            } else {
                document.getElementById('brushPreview').style.display = 'none';
            }
        });

        // SECTION: IMAGE GALLERY & DRAG/DROP
        function loadImage() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.multiple = true;
            input.onchange = function(e) {
                for (let f of e.target.files) {
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        loadedImages.push(ev.target.result);
                        updateGallery();
                        addLog('Image added: ' + f.name);
                    };
                    reader.readAsDataURL(f);
                }
            };
            input.click();
        }

        function clearGallery() {
            if (loadedImages.length === 0) return;
            if (!confirm('Remove all images from gallery?')) return;
            loadedImages = [];
            updateGallery();
            addLog('Gallery cleared');
        }

        function updateGallery() {
            const container = document.getElementById('imageGallery');
            container.innerHTML = '';
            loadedImages.forEach((dataURL, idx) => {
                const wrap = document.createElement('div');
                wrap.className = 'thumb-wrap';
                wrap.draggable = true;
                wrap.addEventListener('dragstart', function(e) {
                    e.dataTransfer.setData('text/plain', dataURL);
                    e.dataTransfer.effectAllowed = 'copy';
                });
                wrap.addEventListener('dblclick', function() {
                    placeImageAtPosition(dataURL, mapWidth / 2, mapHeight / 2);
                });
                const img = document.createElement('img');
                img.src = dataURL;
                img.draggable = false;
                const del = document.createElement('button');
                del.className = 'del';
                del.textContent = '✕';
                del.addEventListener('click', function(e) {
                    e.stopPropagation();
                    loadedImages.splice(idx, 1);
                    updateGallery();
                    addLog('Image removed from gallery');
                });
                wrap.appendChild(img);
                wrap.appendChild(del);
                container.appendChild(wrap);
            });
        }

        const dropZone = document.getElementById('mainView');
        dropZone.addEventListener('dragover', function(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'copy';
            dropZone.classList.add('drag-over');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
        dropZone.addEventListener('drop', function(e) {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            const dataURL = e.dataTransfer.getData('text/plain');
            if (!dataURL) return;
            const rect = canvas.wrapperEl.getBoundingClientRect();
            const zoom = canvas.getZoom();
            const vpt = canvas.viewportTransform;
            const mouseX = (e.clientX - rect.left - vpt[4]) / zoom;
            const mouseY = (e.clientY - rect.top - vpt[5]) / zoom;
            placeImageAtPosition(dataURL, mouseX, mouseY);
        });

        function placeImageAtPosition(dataURL, x, y) {
            fabric.Image.fromURL(dataURL, function(img) {
                const maxDim = Math.min(mapWidth, mapHeight) * 0.25;
                const scale = Math.min(maxDim / img.width, maxDim / img.height, 1);
                img.scale(scale);
                img.set({
                    left: x - (img.width * scale) / 2,
                    top: y - (img.height * scale) / 2,
                    originX: 'left',
                    originY: 'top',
                    selectable: currentTool === 'select',
                    evented: currentTool === 'select',
                    hasControls: true,
                    hasBorders: true,
                    idLayer: activeLayerId,
                    elementType: 'image',
                    elementName: 'Image',
                    erasable: false
                });
                constrainToCanvas(img);
                canvas.add(img);
                if (currentTool === 'select') canvas.setActiveObject(img);
                canvas.renderAll();
                if (currentTool === 'select') showProperties(img);
                addLog('Image placed on canvas');
            });
        }

        // SECTION: TEXT TOOL
        function addText() {
            const input = document.getElementById('textInput');
            const textContent = input.value.trim();
            if (!textContent) return;
            const txt = new fabric.Text(textContent, {
                fontSize: 36,
                fontFamily: "'Cinzel', 'Times New Roman', serif",
                fill: '#f2efe7',
                stroke: 'rgba(0,0,0,0.5)',
                strokeWidth: 0.5,
                shadow: new fabric.Shadow({
                    color: 'rgba(0,0,0,0.8)',
                    blur: 4,
                    offsetX: 2,
                    offsetY: 2
                }),
                left: mapWidth / 2,
                top: mapHeight / 2,
                originX: 'center',
                originY: 'center',
                selectable: currentTool === 'select',
                evented: currentTool === 'select',
                hasControls: true,
                hasBorders: true,
                idLayer: activeLayerId,
                elementType: 'text',
                elementName: textContent,
                erasable: false
            });
            constrainToCanvas(txt);
            canvas.add(txt);
            if (currentTool === 'select') canvas.setActiveObject(txt);
            canvas.renderAll();
            if (currentTool === 'select') showProperties(txt);
            addLog('Text added: "' + textContent + '"');
            input.value = '';
        }

        document.getElementById('textInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') addText();
        });

        // SECTION: LAYERS
        function toggleAddLayer() {
            const row = document.getElementById('addLayerRow');
            row.classList.toggle('hidden');
            if (!row.classList.contains('hidden')) document.getElementById('newLayerName').focus();
        }

        function createNewLayer() {
            const input = document.getElementById('newLayerName');
            const name = input.value.trim();
            if (!name) return;
            const id = 'layer_' + Date.now();
            layers.push({ id, name, visible: true });
            activeLayerId = id;
            updateLayersUI();
            if (currentTool === 'eraser') updateErasableObjects();
            input.value = 'New Layer';
            document.getElementById('addLayerRow').classList.add('hidden');
            addLog('Layer created: "' + name + '"');
        }

        function deleteLayer(id) {
            if (layers.length <= 1) {
                alert('Must keep at least one layer.');
                return;
            }
            const layer = layers.find(c => c.id === id);
            if (!confirm(`Delete layer "${layer.name}" and all its objects?`)) return;
            const objs = canvas.getObjects().filter(o => o.idLayer === id);
            objs.forEach(o => canvas.remove(o));
            layers = layers.filter(c => c.id !== id);
            if (activeLayerId === id) activeLayerId = layers[0].id;
            updateLayersUI();
            if (currentTool === 'eraser') updateErasableObjects();
            canvas.renderAll();
            addLog('Layer deleted: "' + layer.name + '"');
        }

        function toggleLayerVisibility(id, visible) {
            const layer = layers.find(c => c.id === id);
            if (layer) {
                layer.visible = visible;
                canvas.getObjects().forEach(o => {
                    if (o.idLayer === id) o.visible = visible;
                });
                canvas.renderAll();
                addLog('Layer visibility toggled: "' + layer.name + '"');
            }
        }

        function selectActiveLayer(id) {
            activeLayerId = id;
            updateLayersUI();
            if (currentTool === 'eraser') updateErasableObjects();
            addLog('Active layer changed to: "' + layers.find(c => c.id === id).name + '"');
        }

        function updateLayersUI() {
            const select = document.getElementById('selectCapaActiva');
            const list = document.getElementById('listaCapas');
            select.innerHTML = '';
            list.innerHTML = '';
            layers.forEach(layer => {
                const opt = document.createElement('option');
                opt.value = layer.id;
                opt.textContent = layer.name;
                opt.selected = (layer.id === activeLayerId);
                select.appendChild(opt);

                const item = document.createElement('div');
                item.className = 'layer-item';
                if (layer.id === activeLayerId) item.classList.add('active-layer');
                const label = document.createElement('label');
                const chk = document.createElement('input');
                chk.type = 'checkbox';
                chk.checked = layer.visible;
                chk.onchange = (e) => toggleLayerVisibility(layer.id, e.target.checked);
                const span = document.createElement('span');
                span.textContent = layer.name;
                label.appendChild(chk);
                label.appendChild(span);
                item.appendChild(label);
                const del = document.createElement('button');
                del.className = 'del';
                del.textContent = '✕';
                del.onclick = () => deleteLayer(layer.id);
                item.appendChild(del);
                list.appendChild(item);
            });
        }

        // SECTION: PROPERTIES PANEL
        canvas.on('selection:created', (e) => { if (e.selected.length === 1) showProperties(e.selected[0]); else hideProperties(); });
        canvas.on('selection:updated', (e) => { if (e.selected.length === 1) showProperties(e.selected[0]); else hideProperties(); });
        canvas.on('selection:cleared', hideProperties);

        function hideProperties() {
            document.getElementById('propPanel').classList.remove('visible');
        }

        function showProperties(obj) {
            if (obj.idLayer === 'immutable_background' || obj.elementType === 'brush') return;
            const panel = document.getElementById('propPanel');
            panel.classList.remove('hidden');
            panel.classList.add('visible');
            const icon = document.getElementById('propIcon');
            const content = document.getElementById('propContent');

            if (obj.elementType === 'image') {
                icon.textContent = '🖼️';
                content.innerHTML = `
                    <div class="prop-row">
                        <label>Label / Name</label>
                        <input type="text" value="${obj.elementName || ''}" oninput="updateActiveObjectName(this.value)">
                    </div>
                    <div class="prop-row">
                        <label>Width (px)</label>
                        <input type="number" value="${Math.round(obj.width * obj.scaleX)}" oninput="resizeActiveImage(this.value, 'w')">
                    </div>
                    <div class="prop-row">
                        <label>Height (px)</label>
                        <input type="number" value="${Math.round(obj.height * obj.scaleY)}" oninput="resizeActiveImage(this.value, 'h')">
                    </div>
                `;
            } else if (obj.elementType === 'text') {
                icon.textContent = '📝';
                content.innerHTML = `
                    <div class="prop-row">
                        <label>Text Content</label>
                        <input type="text" value="${obj.text || ''}" oninput="updateActiveTextContent(this.value)">
                    </div>
                    <div class="prop-row">
                        <label>Color</label>
                        <input type="color" value="${obj.fill || '#f2efe7'}" oninput="updateActiveTextColor(this.value)">
                    </div>
                `;
            } else {
                icon.textContent = '⚙️';
                content.innerHTML = `<div class="text-sm" style="color:var(--ink-dim);">Element properties</div>`;
            }
        }

        function updateActiveObjectName(val) {
            const obj = canvas.getActiveObject();
            if (obj) {
                obj.elementName = val;
                canvas.renderAll();
            }
        }

        function updateActiveTextContent(val) {
            const obj = canvas.getActiveObject();
            if (obj && obj.elementType === 'text') {
                obj.set('text', val);
                obj.elementName = val;
                canvas.renderAll();
            }
        }

        function updateActiveTextColor(val) {
            const obj = canvas.getActiveObject();
            if (obj && obj.elementType === 'text') {
                obj.set('fill', val);
                canvas.renderAll();
            }
        }

        function resizeActiveImage(val, dim) {
            const obj = canvas.getActiveObject();
            if (!obj || obj.elementType !== 'image') return;
            const num = parseInt(val) || 1;
            if (dim === 'w') {
                const scale = num / obj.width;
                obj.scaleX = scale;
                obj.scaleY = scale;
            } else {
                const scale = num / obj.height;
                obj.scaleY = scale;
                obj.scaleX = scale;
            }
            constrainToCanvas(obj);
            canvas.renderAll();
            const inputs = document.getElementById('propContent').querySelectorAll('input[type="number"]');
            if (inputs.length >= 2) {
                inputs[0].value = Math.round(obj.width * obj.scaleX);
                inputs[1].value = Math.round(obj.height * obj.scaleY);
            }
        }

        function deleteSelected() {
            const obj = canvas.getActiveObject();
            if (obj && obj.idLayer !== 'immutable_background') {
                canvas.remove(obj);
                canvas.discardActiveObject();
                canvas.renderAll();
                hideProperties();
                addLog('Removed selected object');
            }
        }

        // SECTION: ZOOM & PAN CONTROLS
        function updateZoomDisplay() {
            const zoom = Math.round(canvas.getZoom() * 100);
            document.getElementById('zoomLevel').textContent = zoom + '%';
        }

        function limitViewport() {
            const zoom = canvas.getZoom();
            const vpt = canvas.viewportTransform;
            const cw = containerElement.clientWidth;
            const ch = containerElement.clientHeight;
            const zoomedWidth = mapWidth * zoom;
            const zoomedHeight = mapHeight * zoom;
            const marginX = Math.min(cw * 0.8, zoomedWidth * 0.5);
            const marginY = Math.min(ch * 0.8, zoomedHeight * 0.5);
            const minX = cw - zoomedWidth - marginX;
            const maxX = marginX;
            const minY = ch - zoomedHeight - marginY;
            const maxY = marginY;
            if (vpt[4] > maxX) vpt[4] = maxX;
            if (vpt[4] < minX) vpt[4] = minX;
            if (vpt[5] > maxY) vpt[5] = maxY;
            if (vpt[5] < minY) vpt[5] = minY;
        }

        function zoomIn() {
            let z = Math.min(canvas.getZoom() * 1.2, 8);
            canvas.setZoom(z);
            limitViewport();
            updateZoomDisplay();
            canvas.renderAll();
        }

        function zoomOut() {
            let z = Math.max(canvas.getZoom() / 1.2, 0.1);
            canvas.setZoom(z);
            limitViewport();
            updateZoomDisplay();
            canvas.renderAll();
        }

        function zoomFit() {
            fitCanvas();
        }

        canvas.on('mouse:wheel', function(opt) {
            const delta = opt.e.deltaY;
            let zoom = canvas.getZoom();
            zoom *= 0.999 ** delta;
            zoom = Math.min(Math.max(zoom, 0.1), 8);
            canvas.zoomToPoint({ x: opt.e.offsetX, y: opt.e.offsetY }, zoom);
            limitViewport();
            opt.e.preventDefault();
            opt.e.stopPropagation();
            updateZoomDisplay();
        });

        canvas.on('mouse:down', function(opt) {
            if (currentTool === 'picker') {
                const e = opt.e;
                const rect = canvas.lowerCanvasEl.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                try {
                    const ctx = canvas.lowerCanvasEl.getContext('2d');
                    const pixel = ctx.getImageData(x, y, 1, 1).data;
                    const hex = "#" + ((1 << 24) + (pixel[0] << 16) + (pixel[1] << 8) + pixel[2]).toString(16).slice(1);
                    document.getElementById('brushColor').value = hex;
                    updateBrushPreview();
                    addLog('Color tomado: ' + hex);
                    setTool('brush');
                } catch (err) {
                    console.error("Error al tomar color: ", err);
                }
                return;
            }

            if (opt.e.altKey || opt.e.button === 1) {
                this.isDragging = true;
                this.selection = false;
                this.lastPosX = opt.e.clientX;
                this.lastPosY = opt.e.clientY;
                canvas.setCursor('grab');
                opt.e.preventDefault();
            }
        });
        canvas.on('mouse:move', function(opt) {
            if (this.isDragging) {
                const e = opt.e;
                const vpt = this.viewportTransform;
                vpt[4] += e.clientX - this.lastPosX;
                vpt[5] += e.clientY - this.lastPosY;
                limitViewport();
                this.requestRenderAll();
                this.lastPosX = e.clientX;
                this.lastPosY = e.clientY;
            }
        });
        canvas.on('mouse:up', function() {
            if (this.isDragging) {
                this.isDragging = false;
                if (currentTool === 'select') this.selection = true;
                canvas.setCursor(currentTool === 'eraser' || currentTool === 'picker' ? 'crosshair' : 'default');
            }
        });

        // SECTION: EXPORT
        function exportMap(format) {
            const zoom = canvas.getZoom();
            const vpt = canvas.viewportTransform.slice();
            canvas.setViewportTransform([1, 0, 0, 1, 0, 0]);
            canvas.setZoom(1);

            const oldStroke = mapBackgroundObj ? mapBackgroundObj.strokeWidth : 0;
            if (mapBackgroundObj) mapBackgroundObj.set('strokeWidth', 0);
            canvas.renderAll();

            const link = document.createElement('a');
            link.download = `mythopoeia_map_${mapWidth}x${mapHeight}_${Date.now()}.${format}`;
            if (format === 'svg') {
                link.href = 'data:image/svg+xml;utf8,' + encodeURIComponent(canvas.toSVG({
                    viewBox: { x: 0, y: 0, width: mapWidth, height: mapHeight }
                }));
            } else {
                link.href = canvas.toDataURL({
                    format: format,
                    quality: 1.0,
                    left: 0,
                    top: 0,
                    width: mapWidth,
                    height: mapHeight
                });
            }
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            if (mapBackgroundObj) mapBackgroundObj.set('strokeWidth', oldStroke);
            canvas.setViewportTransform(vpt);
            canvas.setZoom(zoom);
            updateZoomDisplay();
            addLog(`Exported map as ${format.toUpperCase()}`);
        }

        // SECTION: SAVE & LOAD PROJECT
        function saveProject() {
            const data = {
                version: '2.7',
                mapSize: { width: mapWidth, height: mapHeight },
                layers: layers,
                objects: []
            };

            canvas.getObjects().forEach(obj => {
                if (obj.elementType && obj.idLayer && obj.idLayer !== 'immutable_background') {
                    const base = {
                        type: obj.elementType,
                        idLayer: obj.idLayer,
                        left: obj.left,
                        top: obj.top,
                        scaleX: obj.scaleX || 1,
                        scaleY: obj.scaleY || 1,
                        angle: obj.angle || 0,
                        originX: obj.originX || 'left',
                        originY: obj.originY || 'top',
                        elementName: obj.elementName || ''
                    };
                    if (obj.elementType === 'brush') {
                        base.pathData = obj.path;
                        base.color = obj.stroke || '#6b8f5e';
                        base.size = obj.strokeWidth || 28;
                        if (obj.eraser) {
                            base.eraser = obj.eraser.toObject();
                        }
                    } else if (obj.elementType === 'image') {
                        base.dataURL = obj.getSrc() || obj._element?.src || obj.toDataURL({ format: 'png', quality: 0.95 });
                    } else if (obj.elementType === 'text') {
                        base.text = obj.text || '';
                        base.color = obj.fill || '#f2efe7';
                    }
                    data.objects.push(base);
                }
            });

            const json = JSON.stringify(data);
            const compressed = LZString.compressToBase64(json);
            const blob = new Blob([compressed], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `mythopoeia_project_${mapWidth}x${mapHeight}.fmf`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(link.href);
            addLog('Project saved successfully (.fmf)');
        }

        // SECTION: SIDEBAR TOGGLE
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
            setTimeout(fitCanvas, 300);
        }

        function loadProject() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.fmf';
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(ev) {
                    try {
                        const json = LZString.decompressFromBase64(ev.target.result);
                        if (!json) throw new Error('Corrupted file format');
                        const data = JSON.parse(json);
                        restoreProject(data);
                        addLog('Project loaded successfully');
                    } catch (err) {
                        alert('Error loading project: ' + err.message);
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function restoreProject(data) {
            canvas.clear();
            canvas.backgroundColor = '#0a1628';

            if (data.mapSize) {
                mapWidth = data.mapSize.width || 2048;
                mapHeight = data.mapSize.height || 2048;
                document.getElementById('mapSizeBadge').textContent = (mapWidth / 1024) + 'K';
                document.querySelectorAll('.btn-group .btn').forEach(b => b.classList.remove('active'));
                if (mapWidth === 1024) document.querySelector('#size1k')?.classList.add('active');
                else if (mapWidth === 2048) document.querySelector('#size2k')?.classList.add('active');
                else if (mapWidth === 4096) document.querySelector('#size4k')?.classList.add('active');
            }

            createMapBackground();

            layers = data.layers || [{ id: 'layer_base', name: 'Base', visible: true }];
            activeLayerId = layers[0].id;
            updateLayersUI();

            data.objects.forEach(objData => {
                if (objData.type === 'brush' && objData.pathData) {
                    const pathObj = new fabric.Path(objData.pathData, {
                        stroke: objData.color || '#6b8f5e',
                        strokeWidth: objData.size || 28,
                        strokeLineCap: 'round',
                        strokeLineJoin: 'round',
                        fill: 'transparent',
                        selectable: false,
                        evented: false,
                        idLayer: objData.idLayer,
                        elementType: 'brush',
                        elementName: objData.elementName || 'Brush Stroke',
                        erasable: true
                    });
                    if (objData.eraser && fabric.Eraser) {
                        pathObj.eraser = fabric.Eraser.fromObject(objData.eraser);
                    }
                    canvas.add(pathObj);
                } else if (objData.type === 'image' && objData.dataURL) {
                    fabric.Image.fromURL(objData.dataURL, function(img) {
                        img.set({
                            left: objData.left || 0,
                            top: objData.top || 0,
                            scaleX: objData.scaleX || 1,
                            scaleY: objData.scaleY || 1,
                            angle: objData.angle || 0,
                            originX: objData.originX || 'left',
                            originY: objData.originY || 'top',
                            selectable: currentTool === 'select',
                            evented: currentTool === 'select',
                            hasControls: true,
                            hasBorders: true,
                            idLayer: objData.idLayer,
                            elementType: 'image',
                            elementName: objData.elementName || 'Image',
                            erasable: false
                        });
                        canvas.add(img);
                        canvas.renderAll();
                    });
                } else if (objData.type === 'text') {
                    const txt = new fabric.Text(objData.text || 'Text', {
                        fontSize: 36,
                        fontFamily: "'Cinzel', 'Times New Roman', serif",
                        fill: objData.color || '#f2efe7',
                        stroke: 'rgba(0,0,0,0.5)',
                        strokeWidth: 0.5,
                        shadow: new fabric.Shadow({
                            color: 'rgba(0,0,0,0.8)',
                            blur: 4,
                            offsetX: 2,
                            offsetY: 2
                        }),
                        left: objData.left || mapWidth / 2,
                        top: objData.top || mapHeight / 2,
                        scaleX: objData.scaleX || 1,
                        scaleY: objData.scaleY || 1,
                        angle: objData.angle || 0,
                        originX: objData.originX || 'center',
                        originY: objData.originY || 'center',
                        selectable: currentTool === 'select',
                        evented: currentTool === 'select',
                        hasControls: true,
                        hasBorders: true,
                        idLayer: objData.idLayer,
                        elementType: 'text',
                        elementName: objData.elementName || 'Text',
                        erasable: false
                    });
                    canvas.add(txt);
                }
            });

            canvas.renderAll();
            fitCanvas();
            hideProperties();
            if (currentTool !== 'select') setTool('select');
            loadedImages = [];
            updateGallery();
            logEntries = [];
            document.getElementById('logContainer').innerHTML = '';
        }

        // SECTION: INIT
        createMapBackground();
        fitCanvas();
        updateLayersUI();
        setTool('select');
        updateZoomDisplay();
        addLog('Map for Mythopoeia initialized');
    </script>
</body>
</html>
